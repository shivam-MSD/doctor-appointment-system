<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <a routerLink="/dashboard" class="close-btn" title="Close and return to Dashboard">&times;</a>
    <div class="auth-header">
      <span class="logo">✙</span>
      <h2>{{ getPortalTitle() }}</h2>
      <p>Sign in to your HealSync account</p>
    </div>

    <!-- Role Selector Tabs -->
    <div class="role-tabs" *ngIf="!isFixedRole">
      <button type="button" class="tab-btn" [class.active]="selectedRole === 'Patient'" (click)="selectRole('Patient')">👤 Patient</button>
      <button type="button" class="tab-btn" [class.active]="selectedRole === 'Doctor'" (click)="selectRole('Doctor')">🩺 Doctor</button>
      <button type="button" class="tab-btn" [class.active]="selectedRole === 'Admin'" (click)="selectRole('Admin')">🏢 Admin</button>
      <button type="button" class="tab-btn" [class.active]="selectedRole === 'SuperAdmin'" (click)="selectRole('SuperAdmin')">👑 SuperAdmin</button>
    </div>

    <form #loginForm="ngForm" (submit)="onSubmit(loginForm); $event.preventDefault()">
      <!-- Error Message Banner -->
      <div class="error-banner" *ngIf="errorMessage">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input 
          class="form-control" 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="name@example.com" 
          required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input 
          class="form-control" 
          type="password" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="••••••••" 
          required>
      </div>

      <button class="btn btn-primary w-100 submit-btn" type="submit">Log In</button>
    </form>

    <div class="auth-footer" *ngIf="getRegisterLink()">
      <p>Don't have an account? <a [routerLink]="getRegisterLink()">Create an account</a></p>
    </div>
  </div>

  <!-- Email Verification OTP Modal -->
  <div class="modal-backdrop" *ngIf="false">
    <div class="glass-card modal-content verification-modal">
      <button type="button" class="modal-close-btn" (click)="closeVerificationModal()">&times;</button>
      
      <div class="modal-header">
        <span class="logo">📧</span>
        <h3>Email Verification Required</h3>
        <p>Please enter the 6-digit OTP code sent to <strong>{{ verificationEmail }}</strong>.</p>
      </div>

      <form (submit)="onVerifySubmit(); $event.preventDefault()">
        <div class="error-banner" *ngIf="verificationError">
          <span>⚠️</span> {{ verificationError }}
        </div>
        <div class="success-banner" *ngIf="verificationSuccess">
          <span>✓</span> {{ verificationSuccess }}
        </div>

        <div class="form-group">
          <label class="form-label" for="verificationOtp">6-Digit Verification Code</label>
          <input 
            class="form-control code-input" 
            type="text" 
            id="verificationOtp" 
            name="verificationOtp" 
            [(ngModel)]="verificationOtp" 
            placeholder="e.g. 123456" 
            maxlength="6"
            required>
        </div>

        <button class="btn btn-primary w-100 submit-btn" type="submit">Verify & Log In</button>
      </form>
    </div>
  </div>
</div>
